name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: macos-13
            target: x86_64-apple-darwin
            suffix: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: herdr-recent-navigator-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/herdr-recent-navigator${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: herdr-recent-navigator-*
          merge-multiple: true

      - name: Generate release notes
        run: |
          cat > notes.md <<'EOF'
          ## Installation

          ```bash
          curl -fsSL https://raw.githubusercontent.com/beyondlex/herdr-recent-navigator/main/install.sh | bash
          ```

          Or download the binary for your platform and run `herdr plugin link /path/to/herdr-recent-navigator`.
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          body_path: notes.md
          files: |
            herdr-recent-navigator-x86_64-unknown-linux-gnu
            herdr-recent-navigator-aarch64-apple-darwin
            herdr-recent-navigator-x86_64-apple-darwin
